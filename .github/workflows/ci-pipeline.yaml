name: Check Code

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COMMITIZEN_START_REV: "9d83e6984277ccbe6c5f6713f65b75a90e7c7e40"

jobs:
  # ---------------------------------------------------------------------------
  # Single lint job — every hook runs as its own step so failures are visible
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed for commitizen rev-range

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: astral-sh/setup-uv@v6

      - name: Ruff (lint)
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: ruff-check --all-files

      - name: Ruff (format)
        if: success() || failure()
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: ruff-format --all-files

      - name: mdformat
        if: success() || failure()
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: mdformat --all-files

      - name: actionlint
        if: success() || failure()
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: actionlint --all-files

      - name: validate-pyproject
        if: success() || failure()
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: validate-pyproject --all-files

      - name: yamlfmt
        if: success() || failure()
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: yamlfmt --all-files

      - name: cspell
        if: success() || failure()
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: cspell --all-files

      - name: Commitizen (push)
        if: (success() || failure()) && github.event_name == 'push'
        run: |
          uv pip install commitizen
          cz check --rev-range ${{ env.COMMITIZEN_START_REV }}..HEAD

      - name: Commitizen (PR)
        if: (success() || failure()) && github.event_name == 'pull_request'
        run: |
          uv pip install commitizen
          cz check --rev-range ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}

  # ---------------------------------------------------------------------------
  # Single matrix job — install once, then run pytest + docs + mypy
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with all extras
        run: uv pip install -e .[doc,lint,test] pytest mypy

      - name: Run pytest
        run: python -m pytest

      - name: Run mypy
        if: (success() || failure()) && matrix.python-version == '3.13'
        run: mypy ./src
